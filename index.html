<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Class Attendance Scanner</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 16px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    }

    h1 {
      margin-top: 0;
      color: #1a73e8;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
    }

    input, select {
      width: 100%;
      padding: 11px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
      font-size: 15px;
      margin-right: 8px;
      margin-top: 8px;
    }

    .btn-primary { background: #1a73e8; }
    .btn-danger { background: #d93025; }
    .btn-success { background: #188038; }

    #reader {
      width: 100%;
      margin-top: 15px;
      display: none;
      min-height: 300px;
    }

    .status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      display: none;
      font-weight: bold;
      white-space: pre-line;
    }

    .success { background: #e6f4ea; color: #137333; display: block; }
    .error { background: #fce8e6; color: #c5221f; display: block; }
    .info { background: #e8f0fe; color: #174ea6; display: block; }
    .warning { background: #fff4e5; color: #9a6700; display: block; }

    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin-top: 15px;
      background: #fafafa;
    }

    .counts {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 10px;
      font-weight: bold;
    }

    .list-box {
      max-height: 260px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-top: 8px;
    }

    .muted {
      color: #555;
      font-size: 14px;
    }

    .pill {
      display: inline-block;
      background: #eef3fd;
      color: #174ea6;
      padding: 6px 10px;
      border-radius: 20px;
      margin-right: 8px;
      margin-top: 6px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Class Attendance Scanner</h1>

    <div class="grid">
      <div>
        <label>Branch</label>
        <input type="text" id="branch" placeholder="e.g. CSE">
      </div>
      <div>
        <label>Year</label>
        <input type="text" id="year" placeholder="e.g. 2">
      </div>
      <div>
        <label>Section</label>
        <input type="text" id="section" placeholder="e.g. A">
      </div>
      <div>
        <label>Subject</label>
        <input type="text" id="subject" placeholder="e.g. DBMS">
      </div>
      <div>
        <label>Hour</label>
        <input type="text" id="hour" placeholder="e.g. 1">
      </div>
      <div>
        <label>Faculty Name</label>
        <input type="text" id="faculty" placeholder="e.g. Murthy">
      </div>
    </div>

    <div>
      <button class="btn-primary" onclick="startSession()">Start Session</button>
      <button class="btn-success" onclick="startScanner()">Start Scanner</button>
      <button class="btn-danger" onclick="stopScanner()">Stop Scanner</button>
      <button class="btn-primary" onclick="finishSession()">Finish Attendance</button>
    </div>

    <div id="sessionInfo" class="card" style="display:none;"></div>

    <div id="reader"></div>
    <div id="status" class="status"></div>

    <div class="card">
      <div><b>Last Scanned:</b> <span id="lastScanned">-</span></div>
      <div class="counts">
        <div>Present in this session: <span id="presentCount">0</span></div>
      </div>
      <div class="muted">Protection enabled: scan twice + length 10 + spaces removed + uppercase.</div>
    </div>

    <div id="summaryCard" class="card" style="display:none;">
      <h3>Attendance Summary</h3>
      <div id="summaryText"></div>

      <h4>Absentees</h4>
      <div id="absentList" class="list-box"></div>
    </div>
  </div>

  <script>
    // ===========================
    // PASTE YOUR APPS SCRIPT WEB APP URL HERE
    // ===========================
    const API_URL = "https://script.google.com/macros/s/AKfycbytPmEO7IZpsdd_1_pywRkQoYPXlJGj_xUe6LlHHvzucW5elLS7ECn9rpam2Vkquapv/exec";

    let sessionId = "";
    let scannerRunning = false;
    let html5QrCode = null;
    let scanLock = false;
    let pendingBarcode = null;
    let pendingTime = null;
    const CONFIRM_TIMEOUT_MS = 15000;
    const EXPECTED_LENGTH = 10;
    let presentCount = 0;

    function showStatus(message, type) {
      const box = document.getElementById("status");
      box.className = "status " + type;
      box.style.display = "block";
      box.innerText = message;
    }

    function cleanText(v) {
      return (v || "").toString().trim();
    }

    function normalizeRoll(v) {
      return cleanText(v).replace(/\s+/g, "").toUpperCase();
    }

    function resetPendingScan() {
      pendingBarcode = null;
      pendingTime = null;
    }

    function getSessionForm() {
      return {
        branch: cleanText(document.getElementById("branch").value),
        year: cleanText(document.getElementById("year").value),
        section: cleanText(document.getElementById("section").value),
        subject: cleanText(document.getElementById("subject").value),
        hour: cleanText(document.getElementById("hour").value),
        faculty: cleanText(document.getElementById("faculty").value)
      };
    }

    function renderSessionInfo(data) {
      const box = document.getElementById("sessionInfo");
      box.style.display = "block";
      box.innerHTML = `
        <div><span class="pill">Session ID: ${data.sessionId}</span></div>
        <div class="muted">
          ${data.branch} - ${data.year} - ${data.section} | ${data.subject} | Hour ${data.hour} | Faculty: ${data.faculty}
        </div>
      `;
    }

    async function apiPost(payload) {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function startSession() {
      if (!API_URL || API_URL.includes("PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE")) {
        showStatus("Please paste your Apps Script Web App URL into index.html first.", "error");
        return;
      }

      const form = getSessionForm();
      if (!form.branch || !form.year || !form.section || !form.subject || !form.hour || !form.faculty) {
        showStatus("Please fill Branch, Year, Section, Subject, Hour and Faculty.", "error");
        return;
      }

      showStatus("Starting session...", "info");

      try {
        const result = await apiPost({
          action: "startSession",
          ...form
        });

        if (result.success) {
          sessionId = result.sessionId;
          presentCount = 0;
          document.getElementById("presentCount").innerText = "0";
          renderSessionInfo({ sessionId, ...form });
          document.getElementById("summaryCard").style.display = "none";
          showStatus(result.message + "\nSession ID: " + sessionId, "success");
        } else {
          showStatus(result.message || "Failed to start session", "error");
        }
      } catch (err) {
        showStatus("API error: " + err, "error");
      }
    }

    async function startScanner() {
      if (!sessionId) {
        showStatus("Start a session first before scanning.", "error");
        return;
      }
      if (scannerRunning) return;

      document.getElementById("reader").style.display = "block";
      html5QrCode = new Html5Qrcode("reader");

      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.333
          },
          onScanSuccess,
          onScanFailure
        );

        scannerRunning = true;
        showStatus("Scanner started. Scan student ID card.", "info");

      } catch (err) {
        showStatus("Camera start error: " + err, "error");
      }
    }

    async function stopScanner() {
      if (html5QrCode && scannerRunning) {
        try {
          await html5QrCode.stop();
          scannerRunning = false;
          document.getElementById("reader").style.display = "none";
          resetPendingScan();
          showStatus("Scanner stopped.", "info");
        } catch (err) {
          showStatus("Error stopping scanner: " + err, "error");
        }
      }
    }

    function onScanFailure(err) {
      // ignore continuous failure callbacks
    }

    async function onScanSuccess(decodedText) {
      if (scanLock) return;
      scanLock = true;

      const scanned = normalizeRoll(decodedText);
      document.getElementById("lastScanned").innerText = scanned;

      // Length validation
      if (scanned.length !== EXPECTED_LENGTH) {
        resetPendingScan();
        showStatus(`Invalid roll number length. Expected ${EXPECTED_LENGTH}, got ${scanned.length}. Scan again.`, "error");
        setTimeout(() => scanLock = false, 1200);
        return;
      }

      const now = Date.now();

      if (pendingTime && (now - pendingTime > CONFIRM_TIMEOUT_MS)) {
        resetPendingScan();
      }

      // First scan
      if (!pendingBarcode) {
        pendingBarcode = scanned;
        pendingTime = now;
        showStatus(`First scan accepted: ${scanned}\nScan the same card again to confirm.`, "warning");
        setTimeout(() => scanLock = false, 1000);
        return;
      }

      // Second scan must match
      if (scanned !== pendingBarcode) {
        const firstValue = pendingBarcode;
        resetPendingScan();
        showStatus(`Scan mismatch.\nFirst: ${firstValue}\nSecond: ${scanned}\nNothing saved. Rescan from beginning.`, "error");
        setTimeout(() => scanLock = false, 1500);
        return;
      }

      // Confirmed roll no
      const confirmedRoll = pendingBarcode;
      resetPendingScan();

      showStatus("Confirmed. Marking attendance...", "info");

      try {
        const result = await apiPost({
          action: "markAttendance",
          sessionId: sessionId,
          rollNo: confirmedRoll
        });

        if (result.success) {
          presentCount++;
          document.getElementById("presentCount").innerText = presentCount;
          showStatus(`Present marked: ${result.rollNo} - ${result.studentName}`, "success");
          beepSuccess();
        } else if (result.duplicate) {
          showStatus(result.message, "error");
          beepDuplicate();
        } else if (result.notFound) {
          showStatus(result.message + "\nRoll No: " + result.rollNo, "error");
        } else if (result.wrongClass) {
          showStatus(result.message, "error");
        } else {
          showStatus(result.message || "Failed to mark attendance", "error");
        }

      } catch (err) {
        showStatus("API error: " + err, "error");
      }

      setTimeout(() => scanLock = false, 1500);
    }

    async function finishSession() {
      if (!sessionId) {
        showStatus("No active session to finish.", "error");
        return;
      }

      showStatus("Generating absentees...", "info");

      try {
        const result = await apiPost({
          action: "finishSession",
          sessionId: sessionId
        });

        if (!result.success) {
          showStatus(result.message || "Failed to finish session", "error");
          return;
        }

        const summaryCard = document.getElementById("summaryCard");
        const summaryText = document.getElementById("summaryText");
        const absentList = document.getElementById("absentList");

        summaryCard.style.display = "block";
        summaryText.innerHTML = `
          <div><b>Class:</b> ${result.session.branch} - ${result.session.year} - ${result.session.section}</div>
          <div><b>Subject:</b> ${result.session.subject}</div>
          <div><b>Hour:</b> ${result.session.hour}</div>
          <div><b>Faculty:</b> ${result.session.faculty}</div>
          <div style="margin-top:8px;">
            <b>Total Students:</b> ${result.totalStudents} |
            <b>Present:</b> ${result.presentCount} |
            <b>Absent:</b> ${result.absentCount}
          </div>
        `;

        if (result.absentees && result.absentees.length > 0) {
          absentList.innerHTML = result.absentees
            .map(st => `<div>${st.rollNo} - ${st.name}</div>`)
            .join("");
        } else {
          absentList.innerHTML = "<div>None. Full attendance.</div>";
        }

        showStatus("Attendance finished. Absentee list generated.", "success");

      } catch (err) {
        showStatus("API error: " + err, "error");
      }
    }

    function beepSuccess() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = "sine";
        osc.frequency.value = 880;
        gain.gain.value = 0.1;
        osc.start();
        setTimeout(() => osc.stop(), 150);
      } catch (e) {}
    }

    function beepDuplicate() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = "square";
        osc.frequency.value = 300;
        gain.gain.value = 0.08;
        osc.start();
        setTimeout(() => osc.stop(), 250);
      } catch (e) {}
    }
  </script>
</body>
</html>
